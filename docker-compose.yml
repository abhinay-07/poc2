# ===========================================================
# SODA_V3_PHASE1 - Docker Compose
# ===========================================================

x-db-env: &db-env
  POSTGRES_HOST: postgres
  POSTGRES_PORT: "5432"
  POSTGRES_DB: kyc_db
  POSTGRES_USER: kyc_user
  POSTGRES_PASSWORD: kyc_pass

services:

  # ---------------------------------------------------------
  # 1. PostgreSQL
  # ---------------------------------------------------------
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      <<: *db-env
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./database/schema.sql:/docker-entrypoint-initdb.d/01_schema.sql
      - ./database/seed_data.sql:/docker-entrypoint-initdb.d/02_seed_data.sql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U kyc_user -d kyc_db"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ---------------------------------------------------------
  # 2. Soda Scanner (one-shot on startup)
  # ---------------------------------------------------------
  soda_scanner:
    build: ./data_quality
    environment:
      <<: *db-env
      SODA_CHECKS_FILE: /app/soda_checks.yml
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

  # ---------------------------------------------------------
  # 3. Soda Scheduler (runs every 6 hours)
  # ---------------------------------------------------------
  soda_scheduler:
    build: ./data_quality
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        echo "[scheduler] Starting – scan every 6 hours"
        while true; do
          python scanner.py
          echo "[scheduler] Next scan in 6 hours …"
          sleep 21600
        done
    environment:
      <<: *db-env
      SODA_CHECKS_FILE: /app/soda_checks.yml
    depends_on:
      soda_scanner:
        condition: service_completed_successfully
    restart: unless-stopped

  # ---------------------------------------------------------
  # 4. Streamlit Dashboard
  # ---------------------------------------------------------
  streamlit_dashboard:
    build: ./app
    environment:
      <<: *db-env
    ports:
      - "8501:8501"
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

volumes:
  pgdata:
